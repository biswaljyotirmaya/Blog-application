<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">

<body>

<!-- 🌐 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4"
     style="background: linear-gradient(135deg, #6a11cb, #2575fc);">

    <a class="navbar-brand fw-bold" href="#">CreativeBlog</a>

    <div class="ms-auto">
        <a th:href="@{/login}" class="btn btn-light btn-sm me-2">Login</a>
        <a th:href="@{/register}" class="btn btn-outline-light btn-sm">Register</a>
    </div>
</nav>

<!-- 🎯 Hero Section -->
<div class="container text-center mt-5">
    <h1 class="fw-bold text-white">Welcome to Creative Blog 🚀</h1>
    <p class="text-light">Share your thoughts, ideas and stories with the world</p>
</div>

<!-- 📝 Blog Posts -->
<div class="container mt-5">

    <div class="row g-4">

        <!-- 🔁 Loop posts -->
        <div class="col-md-4" th:each="post : ${posts}">

            <div class="card shadow-sm h-100 border-0">

                <div class="card-body">

                    <h5 class="card-title fw-bold" th:text="${post.title}">Post Title</h5>

                    <p class="card-text text-muted"
                       th:text="${post.description}">
                        Short description...
                    </p>

                    <a th:href="@{/post/{id}(id=${post.id})}"
                       class="btn btn-purple btn-sm">
                        Read More
                    </a>

                </div>

                <div class="card-footer bg-white border-0 text-muted small">
                    By <span th:text="${post.user.firstName}">Author</span>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
