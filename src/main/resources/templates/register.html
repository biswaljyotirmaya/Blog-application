<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body})}">

<body class="auth-page">

<div class="register-card">
    

    <h3 class="text-center mb-3">
        <i class="bi bi-person-plus"></i> Create Account
    </h3>

    <form th:action="@{/register}" th:object="${userData}" method="post">

        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" th:field="*{firstName}" placeholder="Enter first name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" th:field="*{lastName}" placeholder="Enter last name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" placeholder="Enter email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" th:field="*{password}" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn btn-purple w-100">
            Register
        </button>

    </form>

    <p class="text-center mt-3">
        Already have an account?
        <a th:href="@{/login}" style="color:#6a11cb; font-weight:600;">Login</a>
    </p>

</div>

</body>
</html>
